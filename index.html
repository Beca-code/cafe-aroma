<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Café Aroma ☕</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <!-- Contenedor principal de login -->
    <div class="login-container">
        <!-- Tarjeta de login con glassmorphism -->
        <div class="login-card">
            <!-- Logo y título -->
            <div class="login-header">
                <h1 class="cafe-logo">☕ Café Aroma</h1>
                <p class="tagline">Bienvenido a tu cafetería boutique</p>
            </div>

            <!-- Formulario de login -->
            <form id="loginForm" class="login-form">
                <!-- Campo de email -->
                <div class="form-group">
                    <label for="email">📧 Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="tu@correo.com" 
                        required
                    >
                </div>

                <!-- Campo de contraseña -->
                <div class="form-group">
                    <label for="password">🔐 Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <!-- Botón de ingreso con animación -->
                <button type="submit" class="btn-login">
                    <span>Ingresar</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Link para ir a registro -->
            <div class="login-footer">
                <p>¿No tienes cuenta? <a href="register.html" class="link-register">Regístrate aquí</a></p>
            </div>
        </div>

        <!-- Tarjeta de error (inicialmente oculta) -->
        <div id="errorCard" class="error-card hidden">
            <div class="error-content">
                <i class="fas fa-lock-open"></i>
                <h3>⚠️ Acceso Denegado</h3>
                <p id="errorMessage">Las credenciales no son válidas</p>
                <button onclick="closeErrorCard()" class="btn-close-error">Intentar de nuevo</button>
            </div>
        </div>

        <!-- Indicador de carga -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Verificando credenciales...</p>
        </div>
    </div>

    <!-- Scripts de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js"></script>

    <!-- Scripts locales -->
    <script src="firebase.js"></script>
    <script src="auth.js"></script>

    <script>
        // Evento al cargar la página
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar si hay sesión activa
            if (localStorage.getItem('userRole')) {
                const role = localStorage.getItem('userRole');
                if (role === 'admin') {
                    window.location.href = 'admin.html';
                } else if (role === 'usuario') {
                    window.location.href = 'user.html';
                }
            }

            // Manejador del formulario de login
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
        });

        // Función para cerrar la tarjeta de error
        function closeErrorCard() {
            document.getElementById('errorCard').classList.add('hidden');
        }
    </script>
</body>
</html>
